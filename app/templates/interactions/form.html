{% extends "base/layout.html" %}
{% block title %}Nouvelle interaction — Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nouvelle interaction</h1>
    <a href="{{ url_for('candidatures.detail', id=candidature.id) }}" class="btn">← Retour</a>
</div>

<div class="context-banner">
    <strong>{{ candidature.entreprise.nom }}</strong> — {{ candidature.poste }}
</div>

<form method="POST" class="form-card">
    <div class="form-group">
        <label>Type d'interaction *</label>
        <select name="type_interaction" required>
            {% for t in types %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" rows="5"
            placeholder="Contenu de l'échange, nom de l'interlocuteur, suite prévue..."></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{{ url_for('candidatures.detail', id=candidature.id) }}" class="btn">Annuler</a>
    </div>
</form>
{% endblock %}
