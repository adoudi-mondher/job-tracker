{% extends "base/layout.html" %}
{% block title %}{{ 'Modifier' if candidature else 'Nouvelle' }} candidature — Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Modifier la candidature' if candidature else 'Nouvelle candidature' }}</h1>
    <a href="{{ url_for('candidatures.index') }}" class="btn">← Retour</a>
</div>

<form method="POST" class="form-card">

    <div class="form-row">
        <div class="form-group">
            <label>Entreprise *</label>
            <select name="entreprise_id" required>
                <option value="">— Choisir —</option>
                {% for e in entreprises %}
                <option value="{{ e.id }}"
                    {{ 'selected' if candidature and candidature.entreprise_id == e.id }}>
                    {{ e.nom }} {% if e.localisation %}({{ e.localisation }}){% endif %}
                </option>
                {% endfor %}
            </select>
            <small><a href="{{ url_for('entreprises.nouvelle') }}" target="_blank">
                + Créer une entreprise</a></small>
        </div>
        <div class="form-group">
            <label>Type de contrat</label>
            <select name="type_contrat">
                {% for t in types_contrat %}
                <option value="{{ t }}"
                    {{ 'selected' if candidature and candidature.type_contrat == t or t == 'Alternance' }}>
                    {{ t }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Poste *</label>
        <input type="text" name="poste"
               value="{{ candidature.poste if candidature else '' }}"
               placeholder="Chargé de projet MOA, Product Owner..."
               required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Date d'envoi *</label>
            <input type="date" name="date_envoi"
                   value="{{ candidature.date_envoi.isoformat() if candidature else today }}"
                   required>
        </div>
        <div class="form-group">
            <label>Statut</label>
            <select name="statut">
                {% for s in statuts %}
                <option value="{{ s }}"
                    {{ 'selected' if candidature and candidature.statut == s or s == 'À envoyer' }}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Lien de l'offre</label>
        <input type="url" name="lien_offre"
               value="{{ candidature.lien_offre if candidature else '' }}"
               placeholder="https://...">
    </div>

    <div class="form-group">
        <label>Nom du fichier LM</label>
        <input type="text" name="lm_fichier"
               value="{{ candidature.lm_fichier if candidature else '' }}"
               placeholder="LM_NomEntreprise_2026.pdf">
    </div>

    <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" rows="4"
                  placeholder="Contact rencontré, points clés de l'offre, points à préparer...">{{ candidature.notes if candidature else '' }}</textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            {{ 'Mettre à jour' if candidature else 'Ajouter' }}
        </button>
        <a href="{{ url_for('candidatures.index') }}" class="btn">Annuler</a>
    </div>
</form>
{% endblock %}
