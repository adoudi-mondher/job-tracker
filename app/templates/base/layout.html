<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Style minimal -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <a href="{{ url_for('main.dashboard') }}" class="nav-brand">🎯 Job Tracker</a>
    <div class="nav-links">
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('candidatures.index') }}">Candidatures</a>
        <a href="{{ url_for('entreprises.index') }}">Entreprises</a>
        <a href="{{ url_for('main.logout') }}" class="nav-logout">Déconnexion</a>
    </div>
</nav>

<main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
