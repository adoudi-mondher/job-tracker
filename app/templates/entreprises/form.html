{% extends "base/layout.html" %}
{% block title %}{{ 'Modifier' if entreprise else 'Nouvelle' }} entreprise — Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Modifier' if entreprise else 'Nouvelle entreprise' }}</h1>
    <a href="{{ url_for('entreprises.index') }}" class="btn">← Retour</a>
</div>

<form method="POST" class="form-card">
    <div class="form-group">
        <label>Nom *</label>
        <input type="text" name="nom" value="{{ entreprise.nom if entreprise else '' }}" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Secteur</label>
            <select name="secteur">
                <option value="">— Choisir —</option>
                {% for s in ['Énergie', 'BTP', 'Industrie', 'ESN', 'Startup', 'Telecom', 'Banque/Assurance', 'Autre'] %}
                <option value="{{ s }}" {{ 'selected' if entreprise and entreprise.secteur == s }}>{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Localisation</label>
            <input type="text" name="localisation"
                   value="{{ entreprise.localisation if entreprise and entreprise.localisation else '' }}"
                   placeholder="Metz, Nancy, Paris...">
        </div>
    </div>

    <div class="form-group">
        <label>Site web</label>
        <input type="url" name="site_web"
               value="{{ entreprise.site_web if entreprise and entreprise.site_web else '' }}"
               placeholder="https://...">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Nom du contact</label>
            <input type="text" name="contact_nom"
                   value="{{ entreprise.contact_nom if entreprise and entreprise.contact_nom else '' }}">
        </div>
        <div class="form-group">
            <label>Email du contact</label>
            <input type="email" name="contact_email"
                   value="{{ entreprise.contact_email if entreprise and entreprise.contact_email else '' }}">
        </div>
    </div>

    <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" rows="3"
            placeholder="Effectif, remote, stack, détails...">{{ entreprise.notes if entreprise and entreprise.notes else '' }}</textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            {{ 'Mettre à jour' if entreprise else 'Ajouter' }}
        </button>
        <a href="{{ url_for('entreprises.index') }}" class="btn">Annuler</a>
    </div>

</form>
{% endblock %}
